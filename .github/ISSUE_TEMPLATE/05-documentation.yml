name: 📚 Documentation Issue
description: Report unclear, missing, or incorrect documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before Opening
      options:
        - label: I have searched the existing issues.
          required: true
  - type: input
    id: location
    attributes:
      label: File or Section
      description: File path or heading, if known.
      placeholder: "Example: README.md#optional-tools"
    validations:
      required: false
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is unclear, missing, or incorrect?
    validations:
      required: true
  - type: textarea
    id: suggested-change
    attributes:
      label: Suggested Change
      description: Describe the fix or paste replacement text.
    validations:
      required: false

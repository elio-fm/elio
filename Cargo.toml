[package]
name = "elio"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
crossterm = "0.28"
notify = "7.0"
pulldown-cmark = "0.13"
ratatui = { version = "0.29", default-features = false, features = ["crossterm"] }
serde = { version = "1.0", features = ["derive"] }
syntect = { version = "5.2", default-features = false, features = ["default-fancy"] }
toml = "0.8"

[profile.release]
strip = true

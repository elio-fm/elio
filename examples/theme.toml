# Copy to ~/.config/elio/theme.toml to override the built-in theme.
#
# Supported sections:
# [palette]                 -> UI chrome colors
# [classes.<name>]          -> default icon/color per file class
# [extensions.<ext>]        -> class/icon/color override for a file extension
# [files."<exact-name>"]    -> class/icon/color override for an exact file name
# [directories."<exact-name>"] -> class/icon/color override for an exact directory name
#
# Matching is case-insensitive. Exact file/directory rules win over extension rules.
# Any key you omit falls back to the built-in theme.
#
# Colors use #RRGGBB.

[palette]
bg = "#02050c"
chrome = "#070d16"
chrome_alt = "#0b1220"
panel = "#09101b"
panel_alt = "#060b14"
surface = "#10192a"
elevated = "#152036"
border = "#35506f"
text = "#edf4ff"
muted = "#8ea2bf"
accent = "#7ec4ff"
accent_soft = "#143657"
accent_text = "#eaf5ff"
selected_bg = "#204064"
selected_border = "#95d3ff"
sidebar_active = "#1b3858"
button_bg = "#0e1726"
button_disabled_bg = "#08101b"
path_bg = "#0c1320"

[classes.directory]
icon = "󰉋"
color = "#4ea1ff"

[classes.config]
icon = "󰒓"
color = "#90c6ff"

[classes.document]
icon = "󰈙"
color = "#88c27a"

[extensions.lock]
class = "data"
icon = "󰌾"
color = "#d9b36c"

[extensions.toml]
class = "config"

[files."Cargo.toml"]
class = "config"
icon = "󰣖"

[files."Cargo.lock"]
class = "data"
icon = "󰌾"
color = "#d9b36c"

[files."package.json"]
class = "config"
icon = ""
color = "#e2b450"

[files."Dockerfile"]
class = "config"
icon = "󰡨"
color = "#5ea2e3"

[directories.".git"]
icon = "󰊢"
color = "#e89958"

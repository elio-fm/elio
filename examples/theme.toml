# Copy to ~/.config/elio/theme.toml to override the built-in theme.
#
# Supported sections:
# [palette]                 -> UI chrome colors
# [classes.<name>]          -> default icon/color per file class
# [extensions.<ext>]        -> class/icon/color override for a file extension
# [files."<exact-name>"]    -> class/icon/color override for an exact file name
# [directories."<exact-name>"] -> class/icon/color override for an exact directory name
#
# Matching is case-insensitive. Exact file/directory rules win over extension rules.
# Any key you omit falls back to the built-in theme.
#
# Colors use #RRGGBB.

[palette]
bg = "#0a0e14"
chrome = "#10151e"
chrome_alt = "#18202b"
panel = "#121923"
panel_alt = "#0e141c"
surface = "#161e29"
elevated = "#1b2532"
border = "#314357"
text = "#eef3f8"
muted = "#9eacbd"
accent = "#7cc4ff"
accent_soft = "#22394f"
accent_text = "#cfeaff"
selected_bg = "#294764"
selected_border = "#70c4ff"
sidebar_active = "#1f2f41"
button_bg = "#1d2734"
button_disabled_bg = "#141b25"
path_bg = "#1c2531"

[classes.directory]
icon = "󰉋"
color = "#4ea1ff"

[classes.config]
icon = "󰒓"
color = "#90c6ff"

[classes.document]
icon = "󰈙"
color = "#88c27a"

[extensions.lock]
class = "data"
icon = "󰌾"
color = "#d9b36c"

[extensions.toml]
class = "config"

[files."Cargo.toml"]
class = "config"
icon = "󰣖"

[files."Cargo.lock"]
class = "data"
icon = "󰌾"
color = "#d9b36c"

[files."package.json"]
class = "config"
icon = ""
color = "#e2b450"

[files."Dockerfile"]
class = "config"
icon = "󰡨"
color = "#5ea2e3"

[directories.".git"]
icon = "󰊢"
color = "#e89958"
